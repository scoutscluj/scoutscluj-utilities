name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-central-1
  STACK_NAME: ScoutsClujEc2RdsProductionStack
  DB_NAME: scoutscluj_utilities

jobs:
  deploy:
    name: Build, push, migrate, deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify API
        run: |
          pnpm --filter api lint
          pnpm --filter api typecheck
          pnpm --filter api test

      - name: Typecheck web
        run: pnpm --filter web typecheck

      - name: Verify infra package
        run: pnpm --filter infra verify

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}

      - name: Resolve deployment outputs
        id: stack
        shell: bash
        run: |
          set -euo pipefail

          account_id="$(aws sts get-caller-identity --query Account --output text)"
          api_repository_uri="${account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com/scoutscluj/api"
          web_repository_uri="${account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com/scoutscluj/web"

          stack_outputs="$(aws cloudformation describe-stacks \
            --stack-name "${STACK_NAME}" \
            --query 'Stacks[0].Outputs' \
            --output json)"

          output_value() {
            jq -r --arg key "$1" '.[] | select(.OutputKey == $key) | .OutputValue' <<<"${stack_outputs}"
          }

          {
            echo "account_id=${account_id}"
            echo "api_repository_uri=${api_repository_uri}"
            echo "web_repository_uri=${web_repository_uri}"
            echo "app_host_instance_id=$(output_value AppHostInstanceId)"
            echo "app_secret_name=$(output_value ApplicationSecretName)"
            echo "database_secret_name=$(output_value DatabaseSecretName)"
            echo "database_endpoint=$(output_value DatabaseEndpoint)"
            echo "api_log_group_name=$(output_value ApiLogGroupName)"
            echo "web_log_group_name=$(output_value WebLogGroupName)"
            echo "caddy_log_group_name=$(output_value CaddyLogGroupName)"
          } >>"${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/api.Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.stack.outputs.api_repository_uri }}:${{ github.sha }}
            ${{ steps.stack.outputs.api_repository_uri }}:latest

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/web.Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.stack.outputs.web_repository_uri }}:${{ github.sha }}
            ${{ steps.stack.outputs.web_repository_uri }}:latest

      - name: Deploy on EC2 through SSM
        shell: bash
        run: |
          set -euo pipefail

          api_image="${{ steps.stack.outputs.api_repository_uri }}:${{ github.sha }}"
          web_image="${{ steps.stack.outputs.web_repository_uri }}:${{ github.sha }}"

          parameters="$(jq -n \
            --rawfile script deploy/ec2-deploy.sh \
            --arg region "${AWS_REGION}" \
            --arg apiImage "${api_image}" \
            --arg webImage "${web_image}" \
            --arg appSecret "${{ steps.stack.outputs.app_secret_name }}" \
            --arg databaseSecret "${{ steps.stack.outputs.database_secret_name }}" \
            --arg databaseEndpoint "${{ steps.stack.outputs.database_endpoint }}" \
            --arg dbName "${DB_NAME}" \
            --arg apiLogGroup "${{ steps.stack.outputs.api_log_group_name }}" \
            --arg webLogGroup "${{ steps.stack.outputs.web_log_group_name }}" \
            --arg caddyLogGroup "${{ steps.stack.outputs.caddy_log_group_name }}" \
            '{
              commands: [
                "cat > /tmp/scoutscluj-deploy.sh <<'\''SCOUTSCLUJ_DEPLOY'\''\n" + $script + "\nSCOUTSCLUJ_DEPLOY",
                "chmod +x /tmp/scoutscluj-deploy.sh",
                "AWS_REGION=" + ($region | @sh) +
                  " API_IMAGE=" + ($apiImage | @sh) +
                  " WEB_IMAGE=" + ($webImage | @sh) +
                  " APP_SECRET_NAME=" + ($appSecret | @sh) +
                  " DATABASE_SECRET_NAME=" + ($databaseSecret | @sh) +
                  " DATABASE_ENDPOINT=" + ($databaseEndpoint | @sh) +
                  " DB_NAME=" + ($dbName | @sh) +
                  " API_LOG_GROUP=" + ($apiLogGroup | @sh) +
                  " WEB_LOG_GROUP=" + ($webLogGroup | @sh) +
                  " CADDY_LOG_GROUP=" + ($caddyLogGroup | @sh) +
                  " /tmp/scoutscluj-deploy.sh"
              ]
            }')"

          command_id="$(aws ssm send-command \
            --instance-ids "${{ steps.stack.outputs.app_host_instance_id }}" \
            --document-name AWS-RunShellScript \
            --comment "Deploy Scouts Cluj Utilities ${GITHUB_SHA}" \
            --parameters "${parameters}" \
            --query Command.CommandId \
            --output text)"

          set +e
          aws ssm wait command-executed \
            --command-id "${command_id}" \
            --instance-id "${{ steps.stack.outputs.app_host_instance_id }}"
          wait_status="$?"
          set -e

          aws ssm get-command-invocation \
            --command-id "${command_id}" \
            --instance-id "${{ steps.stack.outputs.app_host_instance_id }}" \
            --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
            --output json

          exit "${wait_status}"
